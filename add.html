<!DOCTYPE html>
<html lang="sv">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lägg till måltid</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <main class="container">
        <div class="headerRow">
            <h1>Lägg till måltid</h1>
            <a class="plusLink" href="index.html" aria-label="Tillbaka till översikt">←</a>
        </div>

        <section class="card">
            <p id="mealContext" class="mealContext"></p>
            <label for="mealTitleInput">Titel på rätten</label>
            <input id="mealTitleInput" type="text" placeholder="Exempel: Kycklinggryta">
            <p id="mealFormMessage" class="formMessage" aria-live="polite"></p>
        </section>

        <section class="card">
            <label for="searchInput">Sök livsmedel</label>
            <input id="searchInput" type="text" placeholder="Exempel: kyckling" oninput="searchFoods(this.value)">
            <div id="results" class="results"></div>
        </section>

        <section id="selectedInfo" class="card hidden">
            <h2 id="currentName"></h2>
            <label for="weightInput">Gram</label>
            <input type="number" id="weightInput" value="100" min="0">

            <div class="nutritionList">
                <p id="currentKcal"></p>
                <p id="currentProtein"></p>
                <p id="currentSugar"></p>
                <p id="currentFat"></p>
                <p id="currentCarbs"></p>
                <p id="currentFiber"></p>
                <p id="currentSalt"></p>
            </div>

            <div class="buttonRow">
                <button type="button" id="addIngredientBtn">Lägg till ingrediens</button>
                <button type="button" id="closeSelectedFoodPanelBtn">Stäng</button>
            </div>
        </section>

        <section class="card">
            <h2>Ingredienser i rätten</h2>
            <ul id="draftIngredientList"></ul>
            <p id="draftNutrition"></p>
            <div class="buttonRow">
                <button type="button" id="saveMealBtn">Spara rätt</button>
                <button type="button" id="deleteMealButton" class="hidden">Ta bort rätt</button>
                <a class="buttonLink" href="index.html">Klar</a>
            </div>
        </section>
    </main>

    <script src="script/AppState.js"></script>
    <script src="script/NumberUtils.js"></script>
    <script src="script/LoadData.js"></script>
    <script src="script/MealForm.js"></script>
    <script src="script/AddMeal.js"></script>
</body>

</html>
