<!DOCTYPE html>
<html lang="sv">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Add a meal</title>
    <link rel="stylesheet" href="css/style.css">
</head>

<body>
    <main class="container">
        <div class="headerRow">
            <h1>Add a meal</h1>
            <a class="plusLink" href="index.html" aria-label="Tillbaka till översikt">←</a>
        </div>

        <section class="card">
            <p id="mealContext" class="mealContext"></p>
            <label for="mealTitleInput">Title of the meal</label>
            <input id="mealTitleInput" type="text" placeholder="Example: Chicken Stew">
            <p id="mealFormMessage" class="formMessage" aria-live="polite"></p>
        </section>

        <section class="card">
            <label for="searchInput">Search for ingredients</label>
            <input id="searchInput" type="text" placeholder="Example: chicken">
            <div id="results" class="results"></div>
        </section>

        <section id="selectedInfo" class="card hidden">
            <h2 id="currentName"></h2>
            <label for="weightInput">Gram</label>
            <input type="number" id="weightInput" value="100" min="0">

            <div class="nutritionList">
                <p id="currentKcal"></p>
                <p id="currentProtein"></p>
                <p id="currentSugar"></p>
                <p id="currentFat"></p>
                <p id="currentCarbs"></p>
                <p id="currentFiber"></p>
                <p id="currentSalt"></p>
            </div>

            <div class="buttonRow">
                <button type="button" id="addIngredientBtn">Add Ingredient</button>
                <button type="button" id="closeSelectedFoodPanelBtn">Close</button>
            </div>
        </section>

        <section class="card">
            <h2>Ingredienser i rätten</h2>
            <ul id="draftIngredientList"></ul>
            <p id="draftNutrition"></p>
            <div class="buttonRow">
                <button type="button" id="saveMealBtn">Save Meal</button>
                <button type="button" id="deleteMealButton" class="hidden">Delete Meal</button>
                <a class="buttonLink" href="index.html">Done</a>
            </div>
        </section>
    </main>

    <script src="script/appState.js"></script>
    <script src="script/numberUtils.js"></script>
    <script src="script/foodApi.js"></script>
    <script src="script/mealHelpers.js"></script>
    <script src="script/addMealPage.js"></script>
</body>

</html>
